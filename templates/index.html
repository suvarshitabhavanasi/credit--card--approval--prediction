<!DOCTYPE html>
<html>
<head>
    <title>Credit Card Approval Prediction</title>
</head>
<body>

<h1>Credit Card Approval Prediction</h1>

<form action="/predict" method="POST">

<label>ID</label><br>
<input type="number" name="ID" required><br><br>

<label>Gender</label><br>
<select name="CODE_GENDER">
    <option value="1">Male</option>
    <option value="0">Female</option>
</select><br><br>

<label>Own Car</label><br>
<select name="FLAG_OWN_CAR">
    <option value="1">Yes</option>
    <option value="0">No</option>
</select><br><br>

<label>Own House</label><br>
<select name="FLAG_OWN_REALTY">
    <option value="1">Yes</option>
    <option value="0">No</option>
</select><br><br>

<label>Number of Children</label><br>
<input type="number" name="CNT_CHILDREN" min="0" required><br><br>

<label>Annual Income</label><br>
<input type="number" name="AMT_INCOME_TOTAL" required><br><br>

<label>Income Type</label><br>
<select name="NAME_INCOME_TYPE">
    <option value="0">Working</option>
    <option value="1">Commercial Associate</option>
    <option value="2">Pensioner</option>
    <option value="3">State Servant</option>
    <option value="4">Student</option>
</select><br><br>

<label>Education Type</label><br>
<select name="NAME_EDUCATION_TYPE">
    <option value="0">Secondary / Secondary Special</option>
    <option value="1">Higher Education</option>
    <option value="2">Incomplete Higher</option>
    <option value="3">Lower Secondary</option>
    <option value="4">Academic Degree</option>
</select><br><br>

<label>Family Status</label><br>
<select name="NAME_FAMILY_STATUS">
    <option value="0">Single</option>
    <option value="1">Married</option>
    <option value="2">Civil Marriage</option>
    <option value="3">Separated</option>
    <option value="4">Widow</option>
</select><br><br>

<label>Housing Type</label><br>
<select name="NAME_HOUSING_TYPE">
    <option value="0">House / Apartment</option>
    <option value="1">With Parents</option>
    <option value="2">Municipal Apartment</option>
    <option value="3">Rented Apartment</option>
    <option value="4">Office Apartment</option>
    <option value="5">Co-op Apartment</option>
</select><br><br>

<label>Days Birth</label><br>
<input type="number" name="DAYS_BIRTH" required><br><br>

<label>Days Employed</label><br>
<input type="number" name="DAYS_EMPLOYED" required><br><br>

<label>Has Mobile Phone</label><br>
<select name="FLAG_MOBIL">
    <option value="1">Yes</option>
    <option value="0">No</option>
</select><br><br>

<label>Has Work Phone</label><br>
<select name="FLAG_WORK_PHONE">
    <option value="1">Yes</option>
    <option value="0">No</option>
</select><br><br>

<label>Has Phone</label><br>
<select name="FLAG_PHONE">
    <option value="1">Yes</option>
    <option value="0">No</option>
</select><br><br>

<label>Has Email</label><br>
<select name="FLAG_EMAIL">
    <option value="1">Yes</option>
    <option value="0">No</option>
</select><br><br>

<label>Occupation Type</label><br>
<select name="OCCUPATION_TYPE">
    <option value="0">Laborers</option>
    <option value="1">Core Staff</option>
    <option value="2">Managers</option>
    <option value="3">Drivers</option>
    <option value="4">Sales Staff</option>
    <option value="5">Accountants</option>
    <option value="6">Medicine Staff</option>
    <option value="7">Security Staff</option>
    <option value="8">High Skill Tech Staff</option>
    <option value="9">Cleaning Staff</option>
    <option value="10">Cooking Staff</option>
    <option value="11">Private Service Staff</option>
    <option value="12">Low Skill Laborers</option>
    <option value="13">Secretaries</option>
    <option value="14">Waiters/Barmen Staff</option>
    <option value="15">Realty Agents</option>
    <option value="16">HR Staff</option>
    <option value="17">IT Staff</option>
</select><br><br>

<label>Family Members</label><br>
<input type="number" step="0.1" name="CNT_FAM_MEMBERS" required><br><br>

<button type="submit">Predict</button>

</form>

<h2>{{ prediction_text }}</h2>

</body>
</html>
